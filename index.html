<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Blaze CS2 — Admin Panel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--orange:#FF6B00;--bg:#0B0F17;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.07)}
body{background:var(--bg);color:#fff;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--orange);border-radius:4px}
#sidebar{width:220px;min-height:100vh;background:rgba(11,15,23,0.98);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{height:60px;background:rgba(11,15,23,0.95);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:14px;position:sticky;top:0;z-index:50}
#content{flex:1;padding:24px;overflow-y:auto}
.logo{padding:20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10}
.logo-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#FF6B00,#ff3300);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 20px rgba(255,107,0,0.5)}
.logo-text{font-size:16px;font-weight:800;color:var(--orange)}
nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-btn{width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:3px;background:transparent;border:1px solid transparent;color:#888;text-align:left;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.nav-btn:hover{background:rgba(255,255,255,0.04);color:#ccc}
.nav-btn.active{background:linear-gradient(135deg,rgba(255,107,0,0.2),rgba(255,107,0,0.05));border-color:rgba(255,107,0,0.35);color:var(--orange);font-weight:700}
.nav-badge{margin-left:auto;background:var(--orange);color:#fff;border-radius:20px;padding:1px 7px;font-size:10px;font-weight:700}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;flex:1}
.btn-primary{background:linear-gradient(135deg,#FF6B00,#FF8C00);border:none;border-radius:10px;padding:9px 18px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .2s;box-shadow:0 4px 15px rgba(255,107,0,0.3)}
.btn-primary:hover{box-shadow:0 6px 25px rgba(255,107,0,0.5)}
.btn-ghost{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:8px 14px;color:#ccc;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px}
.btn-sm{width:30px;height:30px;border-radius:8px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px}
.btn-blue{background:rgba(52,152,219,0.15);border:1px solid rgba(52,152,219,0.3)}
.btn-orange{background:rgba(255,107,0,0.15);border:1px solid rgba(255,107,0,0.3)}
.btn-red{background:rgba(231,76,60,0.15);border:1px solid rgba(231,76,60,0.3)}
.btn-green{background:rgba(0,208,132,0.15);border:1px solid rgba(0,208,132,0.3)}
.inp{padding:10px 14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;font-size:13px;outline:none;font-family:inherit;transition:border-color .2s;width:100%}
.inp:focus{border-color:rgba(255,107,0,0.4)}
select.inp option{background:#1a1f2e;color:#fff}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:9px 12px;text-align:left;color:#666;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid rgba(255,255,255,0.06)}
.tbl td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.04)}
.tbl tr:hover td{background:rgba(255,107,0,0.03)}
.tbl tr.selected td{background:rgba(255,107,0,0.07)}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;display:inline-block}
.badge-pending{color:#FF6B00;background:rgba(255,107,0,0.15);border:1px solid rgba(255,107,0,0.3)}
.badge-confirmed,.badge-delivered,.badge-active{color:#00d084;background:rgba(0,208,132,0.15);border:1px solid rgba(0,208,132,0.3)}
.badge-rejected,.badge-cancelled,.badge-banned{color:#e74c3c;background:rgba(231,76,60,0.15);border:1px solid rgba(231,76,60,0.3)}
.badge-ended,.badge-hidden{color:#888;background:rgba(136,136,136,0.15);border:1px solid rgba(136,136,136,0.3)}
.panel{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;position:sticky;top:24px;width:320px;flex-shrink:0;height:fit-content}
.row{display:flex;gap:16px}
.page{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.tabs{display:flex;gap:4px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.06);flex-wrap:wrap}
.tab{background:none;border:1px solid transparent;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;color:#666;cursor:pointer;transition:all .15s}
.tab.active{background:rgba(255,107,0,0.2);border-color:rgba(255,107,0,0.4);color:var(--orange)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#131820;border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:500px;max-height:80vh;overflow-y:auto}
.toggle{width:44px;height:24px;border-radius:12px;cursor:pointer;position:relative;border:none;transition:background .2s;flex-shrink:0}
.toggle.on{background:linear-gradient(135deg,#FF6B00,#FF8C00)}
.toggle.off{background:rgba(255,255,255,0.1)}
.toggle::after{content:'';position:absolute;top:2px;width:18px;height:18px;border-radius:50%;background:white;transition:left .2s}
.toggle.on::after{left:22px}.toggle.off::after{left:2px}
.stat-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
#toast{position:fixed;top:20px;right:20px;z-index:1000;display:none}
.toast-inner{background:rgba(20,25,35,0.97);border-radius:12px;padding:14px 18px;font-size:14px;font-weight:600;color:#fff;border-left:4px solid var(--orange);box-shadow:0 8px 30px rgba(0,0,0,0.5)}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" style="position:fixed;inset:0;background:#0B0F17;display:flex;align-items:center;justify-content:center;z-index:500;flex-direction:column;gap:20px">
  <div style="font-size:60px">🔥</div>
  <div style="font-size:26px;font-weight:900;color:#FF6B00">Blaze CS2</div>
  <div style="font-size:14px;color:#888;margin-bottom:10px">Admin Panel</div>
  <input id="pw-input" type="password" class="inp" placeholder="Parol kiriting" style="width:280px;text-align:center;font-size:16px"
    onkeydown="if(event.key==='Enter')checkLogin()"/>
  <button class="btn-primary" onclick="checkLogin()" style="width:280px;justify-content:center;padding:13px">Kirish</button>

</div>

<div id="app" style="display:none;width:100%">
<!-- SIDEBAR -->
<div id="sidebar">
  <div class="logo">
    <div class="logo-icon">🔥</div>
    <div><div class="logo-text">BLAZE</div><div style="font-size:9px;color:#888;letter-spacing:.12em">CS2 ADMIN</div></div>
  </div>
  <nav id="sidenav">
    <button class="nav-btn active" onclick="goPage('dashboard')">📊 <span>Dashboard</span></button>
    <button class="nav-btn" onclick="goPage('shop')">🛒 <span>Shop</span></button>
    <button class="nav-btn" onclick="goPage('orders')">📦 <span>Buyurtmalar</span> <span class="nav-badge" id="orders-badge">0</span></button>
    <button class="nav-btn" onclick="goPage('deposits')">💳 <span>To'lovlar</span> <span class="nav-badge" id="dep-badge">0</span></button>
    <button class="nav-btn" onclick="goPage('giveaways')">🎁 <span>Giveawaylar</span></button>
    <button class="nav-btn" onclick="goPage('users')">👥 <span>Foydalanuvchilar</span></button>
    <button class="nav-btn" onclick="goPage('settings')">⚙️ <span>Sozlamalar</span></button>
  </nav>
  <div style="padding:12px 8px;border-top:1px solid var(--border)">
    <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,0.03);border-radius:12px">
      <div style="width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#FF6B00,#ff3300);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900">B</div>
      <div><div style="font-size:12px;font-weight:700">Blaze Admin</div><div style="font-size:10px;color:#888">Administrator</div></div>
    </div>
    <button class="btn-ghost" style="width:100%;justify-content:center;margin-top:8px;color:#e74c3c;border-color:rgba(231,76,60,0.2)" onclick="logout()">🚪 Chiqish</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <div id="breadcrumb" style="font-size:13px;color:#666;flex:1">Dashboard</div>
    <input class="inp" placeholder="Qidirish..." style="width:200px" id="global-search"/>
    <div style="position:relative">
      <div style="width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,0.05);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer">🔔</div>
      <div id="notif-dot" style="position:absolute;top:-2px;right:-2px;width:10px;height:10px;border-radius:50%;background:#FF6B00;border:2px solid #0B0F17;display:none"></div>
    </div>
    <div style="display:flex;align-items:center;gap:9px;padding:6px 12px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid var(--border)">
      <div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#FF6B00,#ff3300);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900">B</div>
      <div style="font-size:12px;font-weight:700">Blaze Admin</div>
    </div>
  </div>
  <div id="content"></div>
</div>
</div>

<!-- TOAST -->
<div id="toast"><div class="toast-inner" id="toast-msg"></div></div>

]

  {id:1,title:'Weekly AK-47 Giveaway',prize_name:'AK-47 | Redline (FT)',participant_count:156,max_participants:200,status:'active',end_time:'2024-05-21 18:00'},
  {id:2,title:'AWP Hyper Beast Special',prize_name:'AWP | Hyper Beast (MW)',participant_count:98,max_participants:150,status:'active',end_time:'2024-05-20 18:00'},
  {id:3,title:'Karambit Mega Giveaway',prize_name:'★ Karambit | Lore (FN)',participant_count:312,max_participants:500,status:'active',end_time:'2024-05-24 18:00'},
]

let selectedItem = null

// ── Auth ──────────────────────────────────────────────────────────
function checkLogin() {
  const pw = document.getElementById('pw-input').value
  if (pw === 'blaze2024') {
    document.getElementById('login-screen').style.display = 'none'
    document.getElementById('app').style.display = 'flex'
    goPage('dashboard')
    updateBadges()
  } else {
    document.getElementById('pw-err').style.display = 'block'
    haptic()
  }
}
function logout() {
  document.getElementById('login-screen').style.display = 'flex'
  document.getElementById('app').style.display = 'none'
  document.getElementById('pw-input').value = ''
}
document.getElementById('pw-input')?.addEventListener('keydown', e => e.key === 'Enter' && checkLogin())

function haptic() {}
function toast(msg, type='success') {
  const colors = {success:'#00d084',error:'#e74c3c',info:'#3498db',warning:'#f39c12'}
  const t = document.getElementById('toast')
  const m = document.getElementById('toast-msg')
  m.textContent = msg
  t.querySelector('.toast-inner').style.borderLeftColor = colors[type]||colors.info
  t.style.display = 'block'
  setTimeout(() => t.style.display='none', 3000)
}
function updateBadges() {
  const pOrders = ORDERS.filter(o=>o.status==='pending').length
  const pDeps = DEPOSITS.filter(d=>d.status==='pending').length
  document.getElementById('orders-badge').textContent = pOrders
  document.getElementById('dep-badge').textContent = pDeps
  if (pOrders+pDeps > 0) document.getElementById('notif-dot').style.display='block'
}

// ── Navigation ────────────────────────────────────────────────────
function goPage(page) {
  currentPage = page; selectedItem = null
  document.querySelectorAll('.nav-btn').forEach(b => {
    const label = b.querySelector('span')?.textContent?.toLowerCase()
    b.classList.toggle('active',
      b.textContent.toLowerCase().includes(page) ||
      (page==='dashboard' && b.textContent.includes('Dashboard')))
  })
  const names = {dashboard:'Dashboard',shop:'Shop Management',orders:'Buyurtmalar',
    deposits:"To'lovlar",giveaways:'Giveawaylar',users:'Foydalanuvchilar',settings:'Sozlamalar'}
  document.getElementById('breadcrumb').innerHTML =
    `<span style="cursor:pointer;color:#666" onclick="goPage('dashboard')">Dashboard</span>` +
    (page!=='dashboard' ? ` <span style="color:#444">›</span> <span style="color:#ccc">${names[page]||page}</span>` : '')
  const pages = {dashboard:renderDashboard,shop:renderShop,orders:renderOrders,
    deposits:renderDeposits,giveaways:renderGiveaways,users:renderUsers,settings:renderSettings}
  document.getElementById('content').innerHTML = `<div class="page">${(pages[page]||renderDashboard)()}</div>`
}

function badge(s) {
  const labels = {pending:'Kutilmoqda',confirmed:'Tasdiqlandi',delivered:'Yetkazildi',
    rejected:'Rad etildi',cancelled:'Bekor',active:'Faol',ended:'Tugadi',hidden:'Yashirin',banned:'Bloklangan'}
  return `<span class="badge badge-${s}">${labels[s]||s}</span>`
}
function num(n) { return (n||0).toLocaleString() }
function pager(total) {
  return `<div style="display:flex;gap:5px;align-items:center">
    ${[1,2,3,'...',Math.max(1,Math.ceil(total/10))].map((p,i)=>`<button style="width:30px;height:30px;border-radius:8px;font-size:12px;font-weight:600;border:1px solid rgba(255,255,255,0.08);background:${i===0?'linear-gradient(135deg,#FF6B00,#ff8c00)':'rgba(255,255,255,0.05)'};color:${i===0?'#fff':'#888'};cursor:pointer">${p}</button>`).join('')}
  </div>`
}
function chartBar(vals, labels, color='#FF6B00') {
  const max = Math.max(...vals)||1
  return `<div style="display:flex;align-items:flex-end;gap:8px;height:100px">
    ${vals.map((v,i)=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
      <div style="width:100%;background:${color};border-radius:4px 4px 0 0;height:${Math.round((v/max)*80)}px;min-height:3px;opacity:.85;transition:height .4s"></div>
      <div style="font-size:9px;color:#666">${labels[i]}</div>
    </div>`).join('')}
  </div>`
}

// ── DASHBOARD ─────────────────────────────────────────────────────
function renderDashboard() {
  const pOrders = ORDERS.filter(o=>o.status==='pending').length

  const todayRev = ORDERS.filter(o=>o.status!=='cancelled').reduce((a,o)=>a+o.price,0)

    <div style="margin-bottom:24px"><h1 style="font-size:24px;font-weight:800">Dashboard</h1><p style="color:#666;font-size:13px;margin-top:3px">Blaze CS2 Admin Panel</p></div>
    <div class="stat-row">
      ${[{l:'Foydalanuvchilar',v:'328',s:'+24 bugun',c:'#9b59b6',i:'👥'},

        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <div style="width:40px;height:40px;border-radius:11px;background:${s.c}18;border:1px solid ${s.c}35;display:flex;align-items:center;justify-content:center;font-size:18px">${s.i}</div>
          <span style="font-size:11px;color:#888;font-weight:600">${s.l}</span>
        </div>
        <div style="font-size:22px;font-weight:800">${s.v}</div>
        <div style="font-size:11px;color:${s.s.startsWith('+')?'#00d084':'#888'};margin-top:4px">${s.s}</div>
      </div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px">
      <div class="card" style="padding:20px">

        `<div class="stat-card" style="padding:12px 16px;border-color:${s.c}25;flex:1"><div style="font-size:10px;color:#888;margin-bottom:3px">${s.l}</div><div style="font-size:18px;font-weight:800;color:${s.c}">${s.v}</div></div>`).join('')}

            <td style="color:#888;font-size:12px;font-family:monospace">${u.telegram_id}</td>

function selectUser(id) {
  const u = USERS.find(x=>x.id===id); if(!u) return
  document.getElementById('user-panel').style.display='block'
  document.getElementById('user-panel').innerHTML = `<div class="panel">
    <div style="display:flex;justify-content:space-between;margin-bottom:14px">
      <h3 style="font-size:15px;font-weight:700">Foydalanuvchi #${u.id}</h3>
      <button onclick="this.closest('#user-panel').style.display='none'" style="background:none;border:none;color:#888;cursor:pointer;font-size:18px">✕</button>
    </div>
    <div style="text-align:center;margin-bottom:16px">
      <div style="width:56px;height:56px;border-radius:18px;background:linear-gradient(135deg,#FF6B00,#ff3300);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;margin:0 auto 10px">${u.first_name[0]}</div>
      <div style="font-size:15px;font-weight:700">${u.username}</div>
      <div style="font-size:12px;color:#888">${u.first_name} · ${u.telegram_id}</div>
      <div style="font-size:20px;font-weight:900;color:#FF6B00;margin-top:8px">${num(u.balance)} so'm</div>
    </div>
    ${[['Buyurtmalar',u.orders+' ta'],['Status',badge(u.is_banned?'banned':'active')],["Qo'shilgan",u.created_at]].map(([k,v])=>
      `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05)"><span style="font-size:12px;color:#888">${k}</span><span style="font-size:12px;font-weight:600">${v}</span></div>`).join('')}
    <div style="margin-top:14px">
      <div style="font-size:11px;color:#888;margin-bottom:7px;font-weight:600">Balans amali</div>
      <div style="display:flex;gap:8px;margin-bottom:8px"><input class="inp" type="number" placeholder="Summa" id="bal-amount" style="flex:1"/></div>
      <div style="display:flex;gap:8px">
        <button class="btn-ghost" style="flex:1;justify-content:center;color:#00d084;border-color:rgba(0,208,132,0.3)" onclick="addBal(${u.id})">+ Qo'shish</button>
        <button class="btn-ghost" style="flex:1;justify-content:center;color:#e74c3c;border-color:rgba(231,76,60,0.3)" onclick="subBal(${u.id})">− Ayirish</button>
      </div>
    </div>
    <div style="margin-top:12px;display:flex;flex-direction:column;gap:7px">
      <button class="btn-ghost" style="justify-content:center;color:var(--orange);border-color:rgba(255,107,0,0.3)" onclick="editUser(${u.id})">✏️ Tahrirlash</button>
      <button class="btn-ghost" style="justify-content:center;color:#e74c3c;border-color:rgba(231,76,60,0.3)" onclick="banUser(${u.id},${u.is_banned})">${u.is_banned?'🔓 Blokdan chiqarish':'🔒 Bloklash'}</button>
    </div>
  </div>`
}
function editUser(id) { toast(`Foydalanuvchi #${id} tahrirlash`,'info') }
function banUser(id, banned) { toast(banned ? `Foydalanuvchi #${id} blokdan chiqarildi`:`Foydalanuvchi #${id} bloklandi`, banned?'success':'error') }
function addBal(id) { const v=document.getElementById('bal-amount')?.value; if(v) toast(`+${num(parseInt(v))} so'm qo'shildi`,'success') }
function subBal(id) { const v=document.getElementById('bal-amount')?.value; if(v) toast(`-${num(parseInt(v))} so'm ayirildi`,'info') }
